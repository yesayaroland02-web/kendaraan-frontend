<!DOCTYPE html>
<html>
<head>
    <title>Detail Kendaraan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h3>Detail Kendaraan</h3>

<table class="table table-bordered">

<tr><td>No Registrasi</td><td id="no"></td></tr>
<tr><td>Nama Pemilik</td><td id="nama"></td></tr>
<tr><td>Alamat</td><td id="alamat"></td></tr>
<tr><td>Merk</td><td id="merk"></td></tr>
<tr><td>Tahun</td><td id="tahun"></td></tr>
<tr><td>Silinder</td><td id="silinder"></td></tr>
<tr><td>Warna</td><td id="warna"></td></tr>
<tr><td>Bahan Bakar</td><td id="bbm"></td></tr>

</table>

<a href="index.html" class="btn btn-secondary">Kembali</a>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

$.get("http://localhost:8080/api/kendaraan/" + id, function(d){

    $("#no").text(d.noRegistrasi);
    $("#nama").text(d.namaPemilik);
    $("#alamat").text(d.alamat);
    $("#merk").text(d.merkKendaraan);
    $("#tahun").text(d.tahunPembuatan);
    $("#silinder").text(d.kapasitasSilinder);
    $("#warna").text(d.warnaKendaraan);
    $("#bbm").text(d.bahanBakar);

});

</script>

</body>
</html>
