<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detail Kendaraan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="container mt-4">

<h3>Detail Kendaraan</h3>

<div id="status" class="mb-3 text-danger"></div>

<table class="table table-bordered">
<tr><td>No Registrasi</td><td id="no"></td></tr>
<tr><td>Nama Pemilik</td><td id="nama"></td></tr>
<tr><td>Alamat</td><td id="alamat"></td></tr>
<tr><td>Merk</td><td id="merk"></td></tr>
<tr><td>Tahun</td><td id="tahun"></td></tr>
<tr><td>Silinder</td><td id="silinder"></td></tr>
<tr><td>Warna</td><td id="warna"></td></tr>
<tr><td>Bahan Bakar</td><td id="bbm"></td></tr>
</table>

<a href="index.html" class="btn btn-secondary">Kembali</a>

</div>

<script>

const baseUrl = "https://kendaraan-backend-production.up.railway.app/api/kendaraan";
const id = new URLSearchParams(window.location.search).get("id");

// =====================
// VALIDASI ID
// =====================
if(!id){
    alert("ID tidak ditemukan");
    window.location.href = "index.html";
}

// =====================
// LOAD DATA
// =====================
function loadDetail(){

    $.get(baseUrl + "/" + id, function(d){

        if(!d){
            $("#status").text("Data tidak ditemukan");
            return;
        }

        $("#no").text(d.noRegistrasi || "-");
        $("#nama").text(d.namaPemilik || "-");
        $("#alamat").text(d.alamat || "-");
        $("#merk").text(d.merkKendaraan || "-");
        $("#tahun").text(d.tahunPembuatan || "-");
        $("#silinder").text(d.kapasitasSilinder || "-");
        $("#warna").text(d.warnaKendaraan || "-");
        $("#bbm").text(d.bahanBakar || "-");

    }).fail(function(err){
        console.log(err);
        $("#status").text("Gagal load data dari server");
    });
}

loadDetail();

</script>

</body>
</html>
