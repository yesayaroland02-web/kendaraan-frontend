<!DOCTYPE html>
<html>
<head>
    <title>Edit Kendaraan</title>

    <!-- jQuery WAJIB -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<form id="formEdit">
    <input id="noRegistrasi">
    <input id="namaPemilik">
    <input id="alamat">
    <input id="merkKendaraan">
    <button type="submit">Simpan</button>
</form>

<script>
$(document).ready(function () {

    const baseUrl = "https://kendaraan-backend-production.up.railway.app/api/kendaraan";
    const id = new URLSearchParams(window.location.search).get("id");

    if (!id) {
        alert("ID tidak ditemukan di URL");
        return;
    }

    $.get(baseUrl + "/" + id, function (data) {
        $("#noRegistrasi").val(data.noRegistrasi);
        $("#namaPemilik").val(data.namaPemilik);
        $("#alamat").val(data.alamat);
        $("#merkKendaraan").val(data.merkKendaraan);
    });

});
</script>

</body>
</html>
