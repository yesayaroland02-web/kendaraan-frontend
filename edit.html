<!DOCTYPE html>

<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Kendaraan</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
```

</head>
<body>

<div class="container mt-4">

```
<h3>Edit Data Kendaraan</h3>

<form id="formEdit">

    <div class="mb-3">
        <label class="form-label">Nomor Registrasi</label>
        <input type="text"
               id="noRegistrasi"
               class="form-control"
               readonly>
    </div>

    <div class="mb-3">
        <label class="form-label">Nama Pemilik</label>
        <input type="text"
               id="namaPemilik"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label class="form-label">Alamat</label>
        <textarea id="alamat"
                  class="form-control"></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Merk Kendaraan</label>
        <input type="text"
               id="merkKendaraan"
               class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Tahun Pembuatan</label>
        <input type="number"
               id="tahunPembuatan"
               class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Kapasitas Silinder</label>
        <input type="number"
               id="kapasitasSilinder"
               class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Warna Kendaraan</label>
        <input type="text"
               id="warnaKendaraan"
               class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Bahan Bakar</label>

        <select id="bahanBakar" class="form-select">
            <option value="Bensin">Bensin</option>
            <option value="Solar">Solar</option>
            <option value="Listrik">Listrik</option>
        </select>
    </div>

    <button type="submit" class="btn btn-success">
        Update
    </button>

    <a href="index.html" class="btn btn-secondary">
        Kembali
    </a>

</form>
```

</div>

<script>

const id = new URLSearchParams(window.location.search).get("id");

$(document).ready(function(){

    $.get(
        "http://localhost:8080/api/kendaraan/" + id,
        function(data){

            $("#noRegistrasi").val(data.noRegistrasi);
            $("#namaPemilik").val(data.namaPemilik);
            $("#alamat").val(data.alamat);
            $("#merkKendaraan").val(data.merkKendaraan);
            $("#tahunPembuatan").val(data.tahunPembuatan);
            $("#kapasitasSilinder").val(data.kapasitasSilinder);
            $("#warnaKendaraan").val(data.warnaKendaraan);
            $("#bahanBakar").val(data.bahanBakar);

        }
    );

});

$("#formEdit").submit(function(e){

    e.preventDefault();

    let data = {

        noRegistrasi: $("#noRegistrasi").val(),
        namaPemilik: $("#namaPemilik").val(),
        alamat: $("#alamat").val(),
        merkKendaraan: $("#merkKendaraan").val(),
        tahunPembuatan: $("#tahunPembuatan").val(),
        kapasitasSilinder: $("#kapasitasSilinder").val(),
        warnaKendaraan: $("#warnaKendaraan").val(),
        bahanBakar: $("#bahanBakar").val()

    };

    $.ajax({

        url: "http://localhost:8080/api/kendaraan/" + id,
        type: "PUT",
        contentType: "application/json",
        data: JSON.stringify(data),

        success: function(){

            alert("Data berhasil diupdate");
            window.location.href = "index.html";

        },

        error: function(){

            alert("Gagal update data");

        }

    });

});

</script>

</body>
</html>
