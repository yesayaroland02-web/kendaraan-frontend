<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tambah Kendaraan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="container mt-4">

<h3>Tambah Kendaraan</h3>

<form id="formTambah">

<input id="noRegistrasi" class="form-control mb-2">
<input id="namaPemilik" class="form-control mb-2">
<input id="alamat" class="form-control mb-2">
<input id="merkKendaraan" class="form-control mb-2">
<input id="tahunPembuatan" class="form-control mb-2">
<input id="kapasitasSilinder" class="form-control mb-2">
<input id="warnaKendaraan" class="form-control mb-2">

<select id="bahanBakar" class="form-control mb-3">
    <option>Bensin</option>
    <option>Solar</option>
    <option>Listrik</option>
</select>

<button class="btn btn-success">Simpan</button>

</form>

</div>

<script>

const baseUrl = "https://kendaraan-backend-production.up.railway.app/api/kendaraan";

$("#formTambah").submit(function(e){
    e.preventDefault();

    const data = {
        noRegistrasi: $("#noRegistrasi").val(),
        namaPemilik: $("#namaPemilik").val(),
        alamat: $("#alamat").val(),
        merkKendaraan: $("#merkKendaraan").val(),
        tahunPembuatan: $("#tahunPembuatan").val(),
        kapasitasSilinder: $("#kapasitasSilinder").val(),
        warnaKendaraan: $("#warnaKendaraan").val(),
        bahanBakar: $("#bahanBakar").val()
    };

    $.ajax({
        url: baseUrl,
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify(data),
        success: function(){
            alert("Berhasil");
            window.location.href = "index.html";
        }
    });

});

</script>

</body>
</html>
