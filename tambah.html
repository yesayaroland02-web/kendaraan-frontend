<!DOCTYPE html>
<html>
<head>
<title>Tambah Kendaraan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="container mt-4">

<h3>Tambah Kendaraan</h3>

<div id="status"></div>

<form id="formTambah">

<input class="form-control mb-2" id="noRegistrasi" placeholder="No Registrasi" required>
<input class="form-control mb-2" id="namaPemilik" placeholder="Nama Pemilik" required>
<input class="form-control mb-2" id="alamat" placeholder="Alamat" required>
<input class="form-control mb-2" id="merkKendaraan" placeholder="Merk" required>
<input class="form-control mb-2" id="tahunPembuatan" placeholder="Tahun" required>
<input class="form-control mb-2" id="kapasitasSilinder" placeholder="Silinder" required>
<input class="form-control mb-2" id="warnaKendaraan" placeholder="Warna" required>

<select class="form-control mb-3" id="bahanBakar">
    <option>Bensin</option>
    <option>Solar</option>
    <option>Listrik</option>
</select>

<button class="btn btn-success" type="submit">Simpan</button>

</form>

</div>

<script>

const baseUrl = "https://kendaraan-backend-production.up.railway.app/api/kendaraan";

$("#formTambah").submit(function(e){
    e.preventDefault();

    const data = {
        noRegistrasi: $("#noRegistrasi").val(),
        namaPemilik: $("#namaPemilik").val(),
        alamat: $("#alamat").val(),
        merkKendaraan: $("#merkKendaraan").val(),
        tahunPembuatan: $("#tahunPembuatan").val(),
        kapasitasSilinder: $("#kapasitasSilinder").val(),
        warnaKendaraan: $("#warnaKendaraan").val(),
        bahanBakar: $("#bahanBakar").val()
    };

    $.ajax({
        url: baseUrl,
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify(data),

        success: function(){
            alert("Berhasil tambah data");
            window.location.href = "index.html";
        },

        error: function(err){
            console.log(err);
            $("#status").html("<div style='color:red'>Gagal tambah data</div>");
        }
    });

});

</script>

</body>
</html>
