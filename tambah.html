<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Tambah Kendaraan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

<div class="container mt-4">

<h3>Tambah Data Kendaraan</h3>

<form id="formKendaraan">

<div class="mb-2">
<label>No Registrasi</label>
<input type="text" id="noRegistrasi"
class="form-control" required>
</div>

<div class="mb-2">
<label>Nama Pemilik</label>
<input type="text" id="namaPemilik"
class="form-control" required>
</div>

<div class="mb-2">
<label>Alamat</label>
<textarea id="alamat"
class="form-control"></textarea>
</div>

<div class="mb-2">
<label>Merk Kendaraan</label>
<input type="text" id="merkKendaraan"
class="form-control">
</div>

<div class="mb-2">
<label>Tahun Pembuatan</label>
<input type="number"
id="tahunPembuatan"
class="form-control">
</div>

<div class="mb-2">
<label>Kapasitas Silinder</label>
<input type="number"
id="kapasitasSilinder"
class="form-control">
</div>

<div class="mb-2">
<label>Warna Kendaraan</label>
<input type="text"
id="warnaKendaraan"
class="form-control">
</div>

<div class="mb-3">
<label>Bahan Bakar</label>

<select id="bahanBakar"
class="form-control">

<option>Bensin</option>
<option>Solar</option>
<option>Listrik</option>

</select>

</div>

<button class="btn btn-success">
Simpan
</button>

<a href="index.html"
class="btn btn-secondary">
Kembali
</a>

</form>

</div>

<script>

$("#formKendaraan").submit(function(e){

e.preventDefault();

let data={

noRegistrasi:$("#noRegistrasi").val(),
namaPemilik:$("#namaPemilik").val(),
alamat:$("#alamat").val(),
merkKendaraan:$("#merkKendaraan").val(),
tahunPembuatan:$("#tahunPembuatan").val(),
kapasitasSilinder:$("#kapasitasSilinder").val(),
warnaKendaraan:$("#warnaKendaraan").val(),
bahanBakar:$("#bahanBakar").val()

};

$.ajax({

url:"https://kendaraan-backend-production.up.railway.app/api/kendaraan",
type:"POST",
contentType:"application/json",
data:JSON.stringify(data),

success:function(){

alert("Data berhasil disimpan");
window.location="index.html";

}

});

});

</script>

</body>
</html>
