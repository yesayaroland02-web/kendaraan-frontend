<!DOCTYPE html>
<html>
<head>
<title>Tambah</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="container mt-4">

<h3>Tambah Kendaraan</h3>

<form id="form">

<input class="form-control mb-2" id="noRegistrasi" placeholder="No Registrasi">
<input class="form-control mb-2" id="namaPemilik" placeholder="Nama">
<input class="form-control mb-2" id="alamat" placeholder="Alamat">
<input class="form-control mb-2" id="merkKendaraan" placeholder="Merk">
<input class="form-control mb-2" id="tahunPembuatan" placeholder="Tahun">
<input class="form-control mb-2" id="kapasitasSilinder" placeholder="Silinder">
<input class="form-control mb-2" id="warnaKendaraan" placeholder="Warna">

<select class="form-control mb-2" id="bahanBakar">
<option>Bensin</option>
<option>Solar</option>
<option>Listrik</option>
</select>

<button class="btn btn-success">Simpan</button>

</form>

</div>

<script>

const baseUrl = "https://kendaraan-backend-production.up.railway.app/api/kendaraan";

$("#form").submit(function(e){
e.preventDefault();

let data = {
noRegistrasi: $("#noRegistrasi").val(),
namaPemilik: $("#namaPemilik").val(),
alamat: $("#alamat").val(),
merkKendaraan: $("#merkKendaraan").val(),
tahunPembuatan: $("#tahunPembuatan").val(),
kapasitasSilinder: $("#kapasitasSilinder").val(),
warnaKendaraan: $("#warnaKendaraan").val(),
bahanBakar: $("#bahanBakar").val()
};

$.ajax({
url: baseUrl,
type: "POST",
contentType: "application/json",
data: JSON.stringify(data),
success: function(){
alert("Berhasil");
window.location = "index.html";
}
});

});

</script>

</body>
</html>
