<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitoring Data Kendaraan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="container mt-4">

<h3>Monitoring Data Kendaraan</h3>

<div class="row mb-3">
    <div class="col-md-6">
        <input type="text" id="searchNo" class="form-control" placeholder="Cari No Registrasi">
    </div>
    <div class="col-md-6">
        <input type="text" id="searchNama" class="form-control" placeholder="Cari Nama Pemilik">
    </div>
</div>

<a href="tambah.html" class="btn btn-primary mb-3">Tambah Data</a>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
    <th>No Registrasi</th>
    <th>Nama</th>
    <th>Merk</th>
    <th>Tahun</th>
    <th>Aksi</th>
</tr>
</thead>

<tbody id="dataBody"></tbody>
</table>

</div>

<script>

const baseUrl = "https://kendaraan-backend-production.up.railway.app/api/kendaraan";

let semuaData = [];

function loadData(){
    $.get(baseUrl, function(res){
        semuaData = res;
        render(res);
    });
}

function render(data){

    let html = "";

    data.forEach(k => {

        html += `
        <tr>
            <td>${k.noRegistrasi}</td>
            <td>${k.namaPemilik}</td>
            <td>${k.merkKendaraan}</td>
            <td>${k.tahunPembuatan}</td>

            <td>
                <a href="detail.html?id=${k.noRegistrasi}" class="btn btn-info btn-sm">Detail</a>
                <a href="edit.html?id=${k.noRegistrasi}" class="btn btn-warning btn-sm">Edit</a>
                <button onclick="hapus('${k.noRegistrasi}')" class="btn btn-danger btn-sm">Hapus</button>
            </td>
        </tr>
        `;
    });

    $("#dataBody").html(html);
}

// SEARCH
$("#searchNo, #searchNama").on("input", function(){

    let no = $("#searchNo").val().toLowerCase();
    let nama = $("#searchNama").val().toLowerCase();

    let hasil = semuaData.filter(x =>
        (x.noRegistrasi || "").toLowerCase().includes(no) &&
        (x.namaPemilik || "").toLowerCase().includes(nama)
    );

    render(hasil);
});

// DELETE
function hapus(id){

    if(!confirm("Yakin hapus?")) return;

    $.ajax({
        url: baseUrl + "/" + id,
        type: "DELETE",
        success: function(){
            loadData();
        },
        error: function(){
            alert("Gagal hapus");
        }
    });
}

loadData();

</script>

</body>
</html>
