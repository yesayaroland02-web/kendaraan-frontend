<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitoring Data Kendaraan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="container mt-4">

    <h3>Monitoring Data Kendaraan</h3>

    <div class="row mb-3">
        <div class="col-md-4">
            <input type="text" id="searchNo" class="form-control"
                   placeholder="Cari Nomor Registrasi">
        </div>

        <div class="col-md-4">
            <input type="text" id="searchNama" class="form-control"
                   placeholder="Cari Nama Pemilik">
        </div>

        <div class="col-md-4">
            <a href="tambah.html" class="btn btn-primary">
                Tambah Data
            </a>
        </div>
    </div>

    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>No Registrasi</th>
            <th>Nama Pemilik</th>
            <th>Merk</th>
            <th>Tahun</th>
            <th>Aksi</th>
        </tr>
        </thead>

        <tbody id="dataBody"></tbody>
    </table>

</div>

<script>

let semuaData=[];

loadData();

function loadData(){

    $.get("http://localhost:8080/api/kendaraan",function(data){

        semuaData=data;
        tampilkanData(data);

    });
}

function tampilkanData(data){

    let html="";

    data.forEach(k=>{

        html+=`
        <tr>
            <td>${k.noRegistrasi}</td>
            <td>${k.namaPemilik}</td>
            <td>${k.merkKendaraan}</td>
            <td>${k.tahunPembuatan}</td>

            <td>

                <a href="detail.html?id=${k.noRegistrasi}"
                   class="btn btn-info btn-sm">
                   Detail
                </a>

                <a href="edit.html?id=${k.noRegistrasi}"
                   class="btn btn-warning btn-sm">
                   Edit
                </a>

                <button class="btn btn-danger btn-sm"
                    onclick="hapus('${k.noRegistrasi}')">
                    Delete
                </button>

            </td>
        </tr>
        `;
    });

    $("#dataBody").html(html);
}

$("#searchNo,#searchNama").on("keyup",function(){

    let no=$("#searchNo").val().toLowerCase();
    let nama=$("#searchNama").val().toLowerCase();

    let hasil=semuaData.filter(x=>

        x.noRegistrasi.toLowerCase().includes(no)
        &&
        x.namaPemilik.toLowerCase().includes(nama)

    );

    tampilkanData(hasil);

});

function hapus(id){

    if(confirm("Yakin hapus data?")){

        $.ajax({
            url:"http://localhost:8080/api/kendaraan/"+id,
            type:"DELETE",
            success:function(){

                alert("Data berhasil dihapus");
                loadData();

            }
        });

    }
}

</script>

</body>
</html>
