<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Kendaraan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="container mt-4">

<h3>Data Kendaraan</h3>

<a href="tambah.html" class="btn btn-primary mb-3">Tambah</a>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>No Registrasi</th>
<th>Nama</th>
<th>Merk</th>
<th>Tahun</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

<script>

const baseUrl = "https://kendaraan-backend-production.up.railway.app/api/kendaraan";

function load(){

    $.get(baseUrl, function(res){

        let html = "";

        res.forEach(k => {

            // safety kalau data rusak
            if(!k._id) return;

            html += `
            <tr>
                <td>${k.noRegistrasi || '-'}</td>
                <td>${k.namaPemilik || '-'}</td>
                <td>${k.merkKendaraan || '-'}</td>
                <td>${k.tahunPembuatan || '-'}</td>

                <td>

                    <a href="detail.html?id=${k._id}" class="btn btn-info btn-sm">
                        Detail
                    </a>

                    <a href="edit.html?id=${k._id}" class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <button onclick="hapus('${k._id}')" class="btn btn-danger btn-sm">
                        Hapus
                    </button>

                </td>
            </tr>
            `;
        });

        $("#data").html(html);

    }).fail(function(err){
        console.log(err);
        alert("Gagal load data");
    });
}

function hapus(id){

    if(!confirm("Yakin hapus data ini?")) return;

    $.ajax({
        url: baseUrl + "/" + id,
        type: "DELETE",
        success: function(){
            load();
        },
        error: function(err){
            console.log(err);
            alert("Gagal hapus data");
        }
    });
}

load();

</script>

</body>
</html>
